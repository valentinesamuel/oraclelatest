name: Deploy to Bastion

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./server/Dockerfile
          push: true
          tags: ghcr.io/valentinesamuel/techgrowthfwcapi:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          SSH_PRIVATE_KEY: op://Bastion/bastion_vps/private key
          DEPLOY_ENV: op://Bastion/project_techgrowthfwcapi/notesPlain

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deployuser
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script_stop: true
          debug: true
          script: |
            cd /opt/projects/techgrowthfwcapi
            cat > .env << 'ENVEOF'
            ${{ env.DEPLOY_ENV }}
            ENVEOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f